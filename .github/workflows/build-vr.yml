name: Build MoonlightVR

on:
  workflow_dispatch:
  push:
    branches:
      - vr
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: vr
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Read version from gradle
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s+"\K[0-9.]+' app/build.gradle)
          WORKFLOW_VERSION="${VERSION_NAME}.${GITHUB_RUN_NUMBER}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "WORKFLOW_VERSION=$WORKFLOW_VERSION" >> $GITHUB_OUTPUT

      - name: Prepare signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/moonlightvr-ci.keystore"

      - name: Build debug APK
        run: |
          GRADLE_OPTS=""
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "refs/heads/main" || "$BRANCH_NAME" == main ]]; then
            GRADLE_OPTS="-PincludeX64"
          fi

          if [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" && -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" && -n "${{ secrets.ANDROID_KEY_ALIAS }}" && -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]]; then
            GRADLE_OPTS="$GRADLE_OPTS -PMOONLIGHTVR_STORE_FILE=$RUNNER_TEMP/moonlightvr-ci.keystore"
            GRADLE_OPTS="$GRADLE_OPTS -PMOONLIGHTVR_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            GRADLE_OPTS="$GRADLE_OPTS -PMOONLIGHTVR_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            GRADLE_OPTS="$GRADLE_OPTS -PMOONLIGHTVR_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          fi

          ./gradlew :app:assembleVrModeDebug $GRADLE_OPTS --no-daemon

      - name: Rename APK with metadata
        run: |
          BUILD_TYPE="debug"
          WORKFLOW_VERSION="${{ steps.version.outputs.WORKFLOW_VERSION }}"
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)
          APK_PATH="app/build/outputs/apk/vrMode/${BUILD_TYPE,,}/app-vrMode-${BUILD_TYPE,,}.apk"
          
          if [ -f "$APK_PATH" ]; then
            NEW_NAME="MoonlightVR-VrMode-${WORKFLOW_VERSION}.apk"
            cp "$APK_PATH" "$NEW_NAME"
            echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV
            echo "APK exists at: $APK_PATH"
          else
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
          echo "WORKFLOW_VERSION=${WORKFLOW_VERSION}" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoonlightVR-VrMode-${{ steps.version.outputs.WORKFLOW_VERSION }}
          path: MoonlightVR-*.apk
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/reports/
            app/build/outputs/**/*.txt
            app/build/outputs/**/*.log
          retention-days: 7

      - name: Summary
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          BRANCH_NAME="${BRANCH_NAME:-manual}"
          WORKFLOW_VERSION="${{ steps.version.outputs.WORKFLOW_VERSION }}"
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | $BRANCH_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Flavor | vrMode |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | debug |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${WORKFLOW_VERSION:-unknown} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | ${{ env.APK_NAME }} |" >> $GITHUB_STEP_SUMMARY
